<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWS Serverless Chat</title>

<style>
*{
    box-sizing:border-box;
    font-family:"Segoe UI", sans-serif;
}

body{
    margin:0;
    height:100vh;
    background: linear-gradient(120deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:420px;
    height:600px;
    background:#fff;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.chat-header{
    background:#0a2540;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.chat-body{
    flex:1;
    padding:15px;
    overflow-y:auto;
    background:#f2f5f9;
    display:flex;
    flex-direction:column;
}

.msg{
    margin:8px 0;
    padding:10px 12px;
    border-radius:10px;
    max-width:80%;
    word-wrap:break-word;
}

.other{
    background:#e0e7ff;
    align-self:flex-start;
}

.self{
    background:#4f46e5;
    color:white;
    align-self:flex-end;
}

.sender{
    font-size:11px;
    font-weight:bold;
    margin-bottom:3px;
}

.chat-footer{
    padding:10px;
    background:#eee;
    display:flex;
    flex-direction:column;
    gap:8px;
}

input{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

button{
    padding:12px;
    background:#0a2540;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#143a63;
}

.emoji-bar{
    display:flex;
    gap:10px;
    font-size:20px;
    cursor:pointer;
}
</style>
</head>
<body>
    <div class="chat-container">
    <div class="chat-header">
        ☁️ AWS Serverless Chat
    </div>

    <div class="chat-body" id="chatBody"></div>

    <div class="chat-footer">
        <input id="name" placeholder="Your name">
        <input id="msg" placeholder="Type message..." onkeypress="enterSend(event)">
        
        <div class="emoji-bar">
            <span onclick="addEmoji('😊')">😊</span>
            <span onclick="addEmoji('😂')">😂</span>
            <span onclick="addEmoji('🔥')">🔥</span>
            <span onclick="addEmoji('❤️')">❤️</span>
            <span onclick="addEmoji('👍')">👍</span>
        </div>

        <button onclick="send()">Send 🚀</button>
    </div>
</div>

<script>
const ws = new WebSocket(
  "wss://i2anh867o4.execute-api.ap-south-1.amazonaws.com/production/"
);

const chatBody = document.getElementById("chatBody");

ws.onopen = () => {
    console.log("✅ Connected to AWS WebSocket");
};

ws.onmessage = e => {
    const data = JSON.parse(e.data);

    const msgDiv = document.createElement("div");
    msgDiv.classList.add("msg");

    const myName = document.getElementById("name").value;

    if(data.sender === myName){
        msgDiv.classList.add("self");
    }else{
        msgDiv.classList.add("other");
    }

    msgDiv.innerHTML = `
        <div class="sender">${data.sender}</div>
        <div>${data.message}</div>
    `;

    chatBody.appendChild(msgDiv);
    chatBody.scrollTop = chatBody.scrollHeight;
};

function send(){
    const name = document.getElementById("name").value.trim();
    const msg = document.getElementById("msg").value.trim();

    if(name === "" || msg === ""){
        alert("Enter name and message");
        return;
    }

    ws.send(JSON.stringify({
        action: "sendMessage",
        sender: name,
        message: msg
    }));

    document.getElementById("msg").value = "";
}

function enterSend(e){
    if(e.key === "Enter"){
        send();
    }
}

function addEmoji(emoji){
    const msgInput = document.getElementById("msg");
    msgInput.value += emoji;
    msgInput.focus();
}
</script>
</body>
</html>
